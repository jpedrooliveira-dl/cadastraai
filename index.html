<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Cadastro</title>
    <link rel="stylesheet" href="./public/css/style.css">
    <link rel="icon" type="image/png" href="./public/assets/img/logo.png">
    <script src="https://kit.fontawesome.com/94a898f0bf.js" crossorigin="anonymous"></script>
</head> 
<body>
    <header>
        <a href="index.html"><img src="./public/assets/img/Web_Photo_Editor.jpg" alt="logo" class="logo"></a>
         <nav>
            <a href="./public/assets/pages/duvida.html">Dúvida</a>
            <a href="./public/assets/pages/login.html">Usuários</a>
            <a href="./public/assets/pages/sobre.html">Sobre</a>
            <button id="themeToggle" class="theme-btn" title="Alternar Tema"><i class="fa-solid fa-sun"></i></button>
        </nav>
    </header>
    <main class="container">
        <section class="form-box">
            <h2>Cadastrar Usuario</h2>
            <p>Preencha os dados abaixo</p>

            <form id="cadastroForm">
                <div class="input-group">
                    <label for="nome">Nome e sobrenome</label>
                    <input type="text" id="nome" placeholder="Digite seu nome..." required>
                </div>
                <div class="input-group">
                    <label for="email">Seu email</label>
                    <input type="email" id="email" placeholder="seu@gmail.com" required>
                </div>
                <div class="input-group">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" placeholder="(11) 9999-9999" required>
                </div>
                <div class="input-group">
                    <label for="senha">Senha <em>(mínimo 8 caracteres)</em></label>
                    <div class="senha-wrapper">
                    <input type="password" id="senha" minlength="8" required>
                    <i class="fa-solid fa-eye" id="toggleSenha"></i>
                    </div>
                </div>
                <button type="submit" id="btnEnviar">Cadastrar</button>
            </form>

            <div id="mensagem" class="hidden"></div>
        </section>
    </main>

    <script src="./public/js/theme.js"></script>
    <script src="./public/js/script.js"></script>
</body>
</html>
