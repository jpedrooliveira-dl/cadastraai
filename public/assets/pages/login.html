<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../../css/login.css">
    <link rel="icon" type="image/png" href="../../assets/img/logo.png">
    <script src="https://kit.fontawesome.com/94a898f0bf.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <a href="../../../index.html"><img src="../img/Web_Photo_Editor.jpg" alt="logo" class="logo"></a>
        <nav>
            <a href="../../../index.html">Home</a>
            <a href="duvida.html">Dúvida</a>
            <a href="sobre.html">Sobre</a>
            <button class="theme-btn" id="themeToggle" aria-label="Alternar tema">
                <i class="fa-solid fa-moon"></i>
            </button>
        </nav>
    </header>

    <main class="container">
        <section class="form-box">
            <h2>Login</h2>
            <p>Faça login para ver seu cadastro</p>

            <form id="loginForm">
                <div class="input-group">
                    <label for="email"><i class="fa-solid fa-envelope icon-label"></i> Email:</label>
                    <input type="email" id="email" placeholder="seuemail@com.br" required>
                </div>

                <div class="input-group">
                    <label for="password"><i class="fa-solid fa-lock icon-label"></i> Senha:</label>
                    <div class="senha-wrapper">
                        <input type="password" id="password" placeholder="Digite sua senha" required>
                        <i class="fa-solid fa-eye" id="toggleSenha"></i>
                    </div>
                </div>

                <button type="submit" id="btnLogin">Entrar</button>

                <a href="../../../index.html">Não tem uma conta?</a>

                <div id="message" class="hidden"></div>
            </form>
        </section>
    </main>

    <script src="../../js/login.js"></script>
</body>
</html>
